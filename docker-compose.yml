services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: buguard
      POSTGRES_PASSWORD: buguard
      POSTGRES_DB: assets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://buguard:buguard@db:5432/assets
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/code/app   # live reload during dev; remove for a "prod-like" build

volumes:
  pgdata:
